name: deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/backend_test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true
          working-directory: backend

      - name: set up database
        run: bin/rails db:create db:migrate

      - name: run specs
        run: bundle exec rspec spec/services/ --format documentation

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: authenticate to gcp
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/241161609911/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@music-ranker-495620.iam.gserviceaccount.com

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: configure docker for gcr
        run: gcloud auth configure-docker gcr.io --quiet

      - name: build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: gcr.io/music-ranker-495620/music-ranker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: deploy to cloud run
        run: |
          gcloud run services update music-ranker-api \
            --region us-central1 \
            --image gcr.io/music-ranker-495620/music-ranker-api:latest \
            --set-env-vars "^|^DATABASE_URL=${{ secrets.DATABASE_URL }}|SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}|SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}|SPOTIFY_REDIRECT_URI=${{ secrets.SPOTIFY_REDIRECT_URI }}|JWT_SECRET=${{ secrets.JWT_SECRET }}|FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}|RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}"
