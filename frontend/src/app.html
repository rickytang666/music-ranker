<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--ink: #1a1a1a;
				--paper: #fafaf7;
				--muted: #999;
				--accent: #e4572e;
				--border: 1.5px solid var(--ink);
				--font-serif: 'Source Serif 4', 'Noto Serif SC', serif;
				--font-mono: 'JetBrains Mono', monospace;
			}
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { height: 100%; background: var(--paper); color: var(--ink); }
			body { font-family: var(--font-serif); }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
